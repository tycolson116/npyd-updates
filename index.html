<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Lookup | NYC Open Data</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="lookup-container">
        <h1>Officer Lookup</h1>
        <p class="subtitle">Search NYC Open Data Live</p>
        
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="OFFICER NAME (e.g., MATTHEW)" autocomplete="off">
            <input type="text" id="shieldInput" placeholder="SHIELD NUMBER (e.g., 2650)" autocomplete="off">
            
            <button id="searchBtn">Search Officer</button>
        </div>

        <div id="resultsArea">
            <p id="statusText">Enter details above to search.</p>
        </div>

        <div class="rights-box">
            <h3>Your 4th Amendment Rights</h3>
            <ul>
                <li><strong>Identify:</strong> Officers must provide name/shield.</li>
                <li><strong>Search:</strong> You may withhold consent for searches.</li>
                <li><strong>Record:</strong> You have a legal right to film.</li>
            </ul>
        </div>
    </div>

    <div id="officerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
