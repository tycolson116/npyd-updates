<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Lookup</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Officer Lookup</h2>
        <p>Search NYC Open Data Live</p>
        
        <input type="text" id="nameInput" placeholder="FIRST NAME (e.g. MATTHEW)">
        <input type="text" id="shieldInput" placeholder="SHIELD NUMBER (e.g. 2650)">
        
        <button id="searchBtn">Search Officer</button>

        <div id="resultsArea">
            <p id="statusText">No live records found.</p>
        </div>
    </div>

    <div id="officerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
